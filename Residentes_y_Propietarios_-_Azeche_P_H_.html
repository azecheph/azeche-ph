<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Residentes y Propietarios - Azeche P.H.</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
        }
        
        .header {
            background: linear-gradient(135deg, #0056B8 0%, #00B853 100%);
            color: white;
            padding: 20px 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .logo-box {
            background: white;
            padding: 10px 20px;
            border-radius: 8px;
        }
        
        .logo-text {
            font-size: 1.5em;
            font-weight: 900;
            letter-spacing: -1px;
        }
        
        .logo-blue { color: #0056B8; }
        .logo-green { color: #00B853; }
        
        .header h1 { font-size: 1.8em; }
        
        .btn-back {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-back:hover {
            background: white;
            color: #0056B8;
        }
        
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .controls-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .select-edificio {
            flex: 1;
            min-width: 200px;
        }
        
        select, input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border 0.3s;
            font-family: inherit;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #0056B8;
        }
        
        .search-box {
            flex: 2;
            min-width: 300px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #0056B8 0%, #00B853 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 86, 184, 0.3);
        }
        
        .btn-secondary {
            background: #00B853;
            color: white;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        
        .btn-info {
            background: #3498db;
            color: white;
        }
        
        .tabs {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .tab-buttons {
            display: flex;
            gap: 10px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }
        
        .tab-btn {
            padding: 15px 30px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1em;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            color: #0056B8;
            border-bottom-color: #0056B8;
        }
        
        .tab-content {
            display: none;
            padding: 20px 0;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .filter-btn.active {
            background: #0056B8;
            color: white;
            border-color: #0056B8;
        }
        
        .lista {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .card.archivado {
            opacity: 0.7;
            background: #f5f5f5;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .card-title {
            font-size: 1.3em;
            font-weight: 700;
            color: #0056B8;
        }
        
        .card-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .badge-activo {
            background: #d4edda;
            color: #155724;
        }
        
        .badge-archivado {
            background: #f8d7da;
            color: #721c24;
        }
        
        .card-body {
            margin-bottom: 15px;
        }
        
        .card-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .card-actions button {
            flex: 1;
            min-width: 80px;
            padding: 8px 12px;
            font-size: 0.9em;
        }
        
        .info-item {
            display: flex;
            margin-bottom: 10px;
        }
        
        .info-label {
            font-weight: 600;
            color: #666;
            min-width: 100px;
        }
        
        .info-value {
            color: #333;
            word-break: break-word;
        }
        
        .observaciones-box {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 3px solid #0056B8;
        }
        
        .observaciones-label {
            font-weight: 600;
            color: #0056B8;
            margin-bottom: 5px;
        }
        
        .observaciones-text {
            color: #555;
            font-size: 0.95em;
            line-height: 1.5;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state h3 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .modal-header h2 {
            color: #0056B8;
        }
        
        .btn-close {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
        }
        
        .required::after {
            content: ' *';
            color: red;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-section">
            <div class="logo-box">
                <span class="logo-text">
                    <span class="logo-blue">AZECHE</span><span class="logo-green">PH</span>
                </span>
            </div>
            <h1>👥 Residentes y Propietarios</h1>
        </div>
        <a href="Dashboard.html" class="btn-back">← Dashboard</a>
    </div>

    <div class="container">
        <div class="controls">
            <div class="controls-row">
                <div class="select-edificio">
                    <select id="edificioSelect" onchange="cambiarEdificio()">
                        <option value="">Seleccionar Edificio</option>
                        <option value="nepal-2">Nepal II</option>
                        <option value="avalon">Avalon</option>
                        <option value="convivienda-1">Convivienda 1</option>
                        <option value="pinos-del-country">Pinos del Country</option>
                        <option value="torre-amin-2">Torre Amin II</option>
                        <option value="millenium-3">Millenium 3</option>
                    </select>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar por nombre, apartamento..." oninput="renderizar()">
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="abrirModalAgregar()">+ Agregar</button>
                    <button class="btn btn-secondary" onclick="exportarExcel()">📊 Exportar Excel</button>
                    <button class="btn btn-info" onclick="autoVincular()" title="Detecta garajes/parqueaderos y los agrupa con su dueño automáticamente">🔗 Auto-vincular garajes</button>
                </div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="cambiarTab('propietarios')">
                    🏠 Propietarios <span id="countPropietarios">(0)</span>
                </button>
                <button class="tab-btn" onclick="cambiarTab('residentes')">
                    👥 Residentes <span id="countResidentes">(0)</span>
                </button>
            </div>

            <div class="filter-bar">
                <button class="filter-btn active" onclick="cambiarFiltro('activo')">✅ Activos</button>
                <button class="filter-btn" onclick="cambiarFiltro('archivado')">📦 Archivados</button>
                <button class="filter-btn" onclick="cambiarFiltro('todos')">📋 Todos</button>
            </div>

            <div id="tabPropietarios" class="tab-content active">
                <div id="listaPropietarios" class="lista"></div>
            </div>

            <div id="tabResidentes" class="tab-content">
                <div id="listaResidentes" class="lista"></div>
            </div>
        </div>
    </div>

    <!-- Modal Agregar/Editar -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitulo">Agregar Propietario</h2>
                <button class="btn-close" onclick="cerrarModal()">✕</button>
            </div>
            <form id="formulario" onsubmit="guardarDatos(event)">
                <div class="form-group">
                    <label class="required">Apartamento</label>
                    <input type="text" id="inputApto" required>
                </div>
                <div class="form-group">
                    <label class="required">Nombre Completo</label>
                    <input type="text" id="inputNombre" required>
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="inputTelefono">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="inputEmail">
                </div>
                <div class="form-group">
                    <label>Documento</label>
                    <input type="text" id="inputDocumento">
                </div>
                <div class="form-group" id="groupCoeficiente">
                    <label>📊 Coeficientes</label>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px;">
                        <div>
                            <label style="font-size:.85em;color:#555;font-weight:600;margin-bottom:4px;display:block;">🏠 Apartamento</label>
                            <input type="number" step="0.0001" min="0" max="1" id="inputCoeficienteApto" oninput="calcularCoefTotal()" placeholder="Ej: 0.0224">
                        </div>
                        <div>
                            <label style="font-size:.85em;color:#555;font-weight:600;margin-bottom:4px;display:block;">🅿️ Parqueadero <span style="color:#999;font-weight:400;">(si aplica)</span></label>
                            <input type="number" step="0.0001" min="0" max="1" id="inputCoeficienteParq" oninput="calcularCoefTotal()" placeholder="Ej: 0.0058">
                        </div>
                    </div>
                    <div style="background:#e8f4ff;border-radius:8px;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;">
                        <span style="font-weight:700;color:#0056B8;font-size:.9em;">∑ Coeficiente Total:</span>
                        <span id="displayCoefTotal" style="font-weight:900;color:#0056B8;font-size:1.05em;">—</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>🏷️ Matrícula Catastral — Apartamento <span style="color:#999;font-weight:400;">(cuando aplique)</span></label>
                    <input type="text" id="inputMatriculaApto" placeholder="Ej: 50N-20-0001234">
                </div>
                <div class="form-group">
                    <label>🅿️ Número de Parqueadero <span style="color:#999;font-weight:400;">(cuando aplique)</span></label>
                    <input type="text" id="inputParqueadero" placeholder="Ej: P-12, 305, Piso 2 - 08">
                </div>
                <div class="form-group">
                    <label>🚗 Matrícula Catastral — Garaje <span style="color:#999;font-weight:400;">(cuando aplique)</span></label>
                    <input type="text" id="inputMatriculaGaraje" placeholder="Ej: 50N-20-0001235">
                </div>
                <div class="form-group">
                    <label>📦 Matrícula Catastral — Depósito <span style="color:#999;font-weight:400;">(cuando aplique)</span></label>
                    <input type="text" id="inputMatriculaDeposito" placeholder="Ej: 50N-20-0001236">
                </div>
                <div class="form-group">
                    <label>🔗 Vincular a apartamento <span style="color:#999;font-weight:400;">(para parqueaderos y garajes)</span></label>
                    <select id="inputVinculadoApto">
                        <option value="">— Sin vincular (mostrar como tarjeta independiente) —</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Observaciones / Tips</label>
                    <textarea id="inputObservaciones" placeholder="Notas, recordatorios, información adicional..."></textarea>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">💾 Guardar</button>
                    <button type="button" class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, onValue, push, set, remove, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyB-RIKKCnOcOctlNDKwM6Enx1Ls-wOMZSo",
            authDomain: "azeche-ph.firebaseapp.com",
            databaseURL: "https://azeche-ph-default-rtdb.firebaseio.com",
            projectId: "azeche-ph",
            storageBucket: "azeche-ph.firebasestorage.app",
            messagingSenderId: "905337990521",
            appId: "1:905337990521:web:c2ca4932672c59fef6c5c9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let edificioActual = '';
        let tabActual = 'propietarios';
        let filtroEstado = 'activo';
        let dataPropietarios = {};
        let dataResidentes = {};
        let modoEdicion = false;
        let keyEdicion = '';

        // Cargar datos
        const propRef = ref(db, 'propietarios');
        const resRef = ref(db, 'residentes');

        onValue(propRef, (snapshot) => {
            dataPropietarios = snapshot.val() || {};
            renderizar();
        });

        onValue(resRef, (snapshot) => {
            dataResidentes = snapshot.val() || {};
            renderizar();
        });

        // Cambiar edificio
        window.cambiarEdificio = function() {
            edificioActual = document.getElementById('edificioSelect').value;
            renderizar();
        };

        // Cambiar tab
        window.cambiarTab = function(tab) {
            tabActual = tab;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            if (tab === 'propietarios') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('tabPropietarios').classList.add('active');
            } else {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('tabResidentes').classList.add('active');
            }
        };

        // Cambiar filtro
        window.cambiarFiltro = function(filtro) {
            filtroEstado = filtro;
            
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            renderizar();
        };

        // Renderizar
        function renderizar() {
            const edificio = edificioActual;
            const busqueda = document.getElementById('searchInput').value.toLowerCase();
        // FUNCIÓN PARA ORDENAR POR NÚMERO DE APARTAMENTO
        function ordenarPorApartamento(entries) {
            return entries.sort((a, b) => {
                const aptoA = a[1].apto || '999999';
                const aptoB = b[1].apto || '999999';
                
                // Extraer número del apartamento
                const numA = parseInt(aptoA.replace(/\D/g, '')) || 999999;
                const numB = parseInt(aptoB.replace(/\D/g, '')) || 999999;
                
                return numA - numB;
            });
        }


            // ── Mapa de vinculados (garajes/parqueaderos agrupados) ──
            function buildVinculadosMap(data) {
                const mapa = {};    // { parentKey: [ {key, ...entry} ] }
                const hijos = new Set();
                if (!data) return { mapa, hijos };
                Object.entries(data).forEach(([key, entry]) => {
                    if (entry.vinculadoAptoKey) {
                        hijos.add(key);
                        if (!mapa[entry.vinculadoAptoKey]) mapa[entry.vinculadoAptoKey] = [];
                        mapa[entry.vinculadoAptoKey].push({ key, ...entry });
                    }
                });
                return { mapa, hijos };
            }

            // Propietarios
            const propList = document.getElementById('listaPropietarios');
            propList.innerHTML = '';
            let countProp = 0;
            const { mapa: vMapProp, hijos: vHijosProp } = buildVinculadosMap(dataPropietarios[edificio]);

            if (edificio && dataPropietarios[edificio]) {
                ordenarPorApartamento(Object.entries(dataPropietarios[edificio])).forEach(([key, prop]) => {
                    if (vHijosProp.has(key)) return; // se muestra dentro del padre
                    const estado = prop.estado || 'activo';
                    if ((filtroEstado === 'todos' || estado === filtroEstado) &&
                        (!busqueda ||
                        prop.nombre?.toLowerCase().includes(busqueda) ||
                        prop.apto?.toLowerCase().includes(busqueda))) {
                        propList.innerHTML += crearCard(prop, key, 'propietario', vMapProp[key] || []);
                        countProp++;
                    }
                });
            }

            if (countProp === 0) {
                propList.innerHTML = `
                    <div class="empty-state">
                        <h3>📭 No hay propietarios</h3>
                        <p>${!edificio ? 'Selecciona un edificio' : 'No se encontraron propietarios ' + (filtroEstado === 'activo' ? 'activos' : filtroEstado === 'archivado' ? 'archivados' : '')}</p>
                    </div>
                `;
            }

            // Residentes
            const resList = document.getElementById('listaResidentes');
            resList.innerHTML = '';
            let countRes = 0;
            const { mapa: vMapRes, hijos: vHijosRes } = buildVinculadosMap(dataResidentes[edificio]);

            if (edificio && dataResidentes[edificio]) {
                ordenarPorApartamento(Object.entries(dataResidentes[edificio])).forEach(([key, res]) => {
                    if (vHijosRes.has(key)) return;
                    const estado = res.estado || 'activo';
                    if ((filtroEstado === 'todos' || estado === filtroEstado) &&
                        (!busqueda ||
                        res.nombre?.toLowerCase().includes(busqueda) ||
                        res.apto?.toLowerCase().includes(busqueda))) {
                        resList.innerHTML += crearCard(res, key, 'residente', vMapRes[key] || []);
                        countRes++;
                    }
                });
            }

            if (countRes === 0) {
                resList.innerHTML = `
                    <div class="empty-state">
                        <h3>📭 No hay residentes</h3>
                        <p>${!edificio ? 'Selecciona un edificio' : 'No se encontraron residentes ' + (filtroEstado === 'activo' ? 'activos' : filtroEstado === 'archivado' ? 'archivados' : '')}</p>
                    </div>
                `;
            }

            document.getElementById('countPropietarios').textContent = `(${countProp})`;
            document.getElementById('countResidentes').textContent = `(${countRes})`;
        }

        window.renderizar = renderizar;

        // Crear card
        function crearCard(persona, key, tipo, vinculados = []) {
            const estado = persona.estado || 'activo';
            const coefApto   = parseFloat(persona.coeficienteApto) || 0;
            const coefParq   = parseFloat(persona.coeficienteParq) || 0;
            const coefLegado = parseFloat(persona.coeficiente)     || 0;
            const coefBase   = (coefApto > 0 || coefParq > 0) ? coefApto + coefParq : coefLegado;
            const coefVinc   = vinculados.reduce((s, v) => s + (parseFloat(v.coeficienteApto) || parseFloat(v.coeficiente) || 0), 0);
            const coefTotal  = coefBase + coefVinc;
            const tieneCoef  = coefTotal > 0;
            const badge = estado === 'activo' ? 
                '<span class="card-badge badge-activo">✅ Activo</span>' :
                '<span class="card-badge badge-archivado">📦 Archivado</span>';
            
            const btnArchivar = estado === 'activo' ? 
                `<button class="btn btn-info" onclick="archivarPersona('${key}', '${tipo}')">📦 Archivar</button>` :
                `<button class="btn btn-info" onclick="desarchivarPersona('${key}', '${tipo}')">↩️ Restaurar</button>`;
            
            return `
                <div class="card ${estado === 'archivado' ? 'archivado' : ''}">
                    <div class="card-header">
                        <div class="card-title">🏠 ${persona.apto || 'S/N'}</div>
                        ${badge}
                    </div>
                    <div class="card-body">
                        <div class="info-item">
                            <span class="info-label">Nombre:</span>
                            <span class="info-value">${persona.nombre || 'Sin nombre'}</span>
                        </div>
                        ${persona.telefono ? `
                        <div class="info-item">
                            <span class="info-label">Teléfono:</span>
                            <span class="info-value">${persona.telefono}</span>
                        </div>
                        ` : ''}
                        ${persona.email ? `
                        <div class="info-item">
                            <span class="info-label">Email:</span>
                            <span class="info-value">${persona.email}</span>
                        </div>
                        ` : ''}
                        ${tieneCoef ? `
                        <div class="info-item" style="flex-direction:column;align-items:flex-start;gap:3px;background:#f0f6ff;padding:8px 10px;border-radius:8px;margin:2px 0;">
                            ${coefApto > 0 ? `<span class="info-value">🏠 Coef. Apto: ${(coefApto*100).toFixed(4)}%</span>` : ''}
                            ${coefParq > 0 ? `<span class="info-value">🅿️ Coef. Parqueadero: ${(coefParq*100).toFixed(4)}%</span>` : ''}
                            <span class="info-value" style="font-weight:700;color:#0056B8;">∑ Total: ${(coefTotal*100).toFixed(4)}%</span>
                        </div>
                        ` : ''}
                        ${persona.documento ? `
                        <div class="info-item">
                            <span class="info-label">Documento:</span>
                            <span class="info-value">${persona.documento}</span>
                        </div>
                        ` : ''}
                        ${persona.parqueadero ? `
                        <div class="info-item">
                            <span class="info-label">🅿️ Parqueadero:</span>
                            <span class="info-value">${persona.parqueadero}</span>
                        </div>
                        ` : ''}
                        ${(persona.matriculaApto || persona.matriculaGaraje || persona.matriculaDeposito) ? `
                        <div class="info-item" style="flex-direction:column; align-items:flex-start; gap:4px; background:#f0f4ff; padding:8px 10px; border-radius:8px; margin-top:4px;">
                            <span class="info-label" style="margin-bottom:4px;">🏷️ Matrículas catastrales:</span>
                            ${persona.matriculaApto ? `<span class="info-value">🏠 Apto: ${persona.matriculaApto}</span>` : ''}
                            ${persona.matriculaGaraje ? `<span class="info-value">🚗 Garaje: ${persona.matriculaGaraje}</span>` : ''}
                            ${persona.matriculaDeposito ? `<span class="info-value">📦 Depósito: ${persona.matriculaDeposito}</span>` : ''}
                        </div>
                        ` : ''}
                        ${persona.observaciones ? `
                        <div class="observaciones-box">
                            <div class="observaciones-label">💡 Observaciones:</div>
                            <div class="observaciones-text">${persona.observaciones}</div>
                        </div>
                        ` : ''}
                    </div>
                    ${vinculados.length > 0 ? `
                    <div style="background:#e8f4ff;border-radius:8px;padding:10px 12px;margin:6px 0 10px;">
                        <div style="font-weight:700;color:#0056B8;font-size:.82em;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;">🔗 Parqueaderos / Garajes vinculados</div>
                        ${vinculados.map(v => {
                            const cf = parseFloat(v.coeficienteApto) || parseFloat(v.coeficiente) || 0;
                            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #c5d8f7;font-size:.9em;">
                                <span style="font-weight:700;">🅿️ ${v.apto}</span>
                                <span style="color:#555;">${v.nombre || ''}</span>
                                <span style="display:flex;gap:6px;align-items:center;">
                                    ${cf > 0 ? `<span style="color:#0056B8;font-weight:700;">${(cf*100).toFixed(4)}%</span>` : ''}
                                    <button class="btn btn-warning" style="padding:3px 8px;font-size:.78em;" onclick="editarPersona('${v.key}','${tipo}')">✏️</button>
                                </span>
                            </div>`;
                        }).join('')}
                    </div>` : ''}
                    <div class="card-actions">
                        <button class="btn btn-warning" onclick="editarPersona('${key}', '${tipo}')">✏️ Editar</button>
                        ${btnArchivar}
                        <button class="btn btn-danger" onclick="eliminarPersona('${key}', '${tipo}')">🗑️ Eliminar</button>
                    </div>
                </div>
            `;
        }

        // Modal
        window.abrirModalAgregar = function() {
            if (!edificioActual) {
                alert('⚠️ Primero selecciona un edificio');
                return;
            }
            
            modoEdicion = false;
            document.getElementById('modalTitulo').textContent = 
                tabActual === 'propietarios' ? 'Agregar Propietario' : 'Agregar Residente';
            
            document.getElementById('formulario').reset();
            document.getElementById('displayCoefTotal').textContent = '—';
            document.getElementById('groupCoeficiente').style.display =
                tabActual === 'propietarios' ? 'block' : 'none';
            poblarSelectVincular(null, null);

            document.getElementById('modal').classList.add('active');
        };

        window.cerrarModal = function() {
            document.getElementById('modal').classList.remove('active');
        };

        // Editar
        window.editarPersona = function(key, tipo) {
            modoEdicion = true;
            keyEdicion = key;
            
            const data = tipo === 'propietario' ? 
                dataPropietarios[edificioActual][key] : 
                dataResidentes[edificioActual][key];
            
            document.getElementById('modalTitulo').textContent = 
                tipo === 'propietario' ? 'Editar Propietario' : 'Editar Residente';
            
            document.getElementById('inputApto').value = data.apto || '';
            document.getElementById('inputNombre').value = data.nombre || '';
            document.getElementById('inputTelefono').value = data.telefono || '';
            document.getElementById('inputEmail').value = data.email || '';
            document.getElementById('inputDocumento').value = data.documento || '';
            document.getElementById('inputCoeficienteApto').value = data.coeficienteApto !== undefined ? data.coeficienteApto : (data.coeficiente || '');
            document.getElementById('inputCoeficienteParq').value = data.coeficienteParq || '';
            calcularCoefTotal();
            document.getElementById('inputMatriculaApto').value = data.matriculaApto || '';
            document.getElementById('inputParqueadero').value = data.parqueadero || '';
            document.getElementById('inputMatriculaGaraje').value = data.matriculaGaraje || '';
            document.getElementById('inputMatriculaDeposito').value = data.matriculaDeposito || '';
            document.getElementById('inputObservaciones').value = data.observaciones || '';
            poblarSelectVincular(key, data.vinculadoAptoKey || '');

            document.getElementById('groupCoeficiente').style.display =
                tipo === 'propietario' ? 'block' : 'none';
            
            document.getElementById('modal').classList.add('active');
        };

        // Guardar
        window.guardarDatos = async function(e) {
            e.preventDefault();
            
            const datos = {
                edificio: edificioActual,
                apto: document.getElementById('inputApto').value,
                nombre: document.getElementById('inputNombre').value,
                telefono: document.getElementById('inputTelefono').value,
                email: document.getElementById('inputEmail').value,
                documento: document.getElementById('inputDocumento').value,
                matriculaApto: document.getElementById('inputMatriculaApto').value,
                parqueadero: document.getElementById('inputParqueadero').value,
                matriculaGaraje: document.getElementById('inputMatriculaGaraje').value,
                matriculaDeposito: document.getElementById('inputMatriculaDeposito').value,
                observaciones: document.getElementById('inputObservaciones').value,
                vinculadoAptoKey: document.getElementById('inputVinculadoApto').value || '',
                estado: 'activo'
            };
            
            if (tabActual === 'propietarios') {
                const coefApto = parseFloat(document.getElementById('inputCoeficienteApto').value) || 0;
                const coefParq = parseFloat(document.getElementById('inputCoeficienteParq').value) || 0;
                datos.coeficienteApto = coefApto;
                datos.coeficienteParq = coefParq;
                datos.coeficiente     = coefApto + coefParq; // campo total (compatibilidad)
            }
            
            try {
                const tipo = tabActual === 'propietarios' ? 'propietarios' : 'residentes';
                
                if (modoEdicion) {
                    // Mantener estado existente al editar
                    const estadoActual = (tabActual === 'propietarios' ? 
                        dataPropietarios[edificioActual][keyEdicion]?.estado : 
                        dataResidentes[edificioActual][keyEdicion]?.estado) || 'activo';
                    datos.estado = estadoActual;
                    
                    await update(ref(db, `${tipo}/${edificioActual}/${keyEdicion}`), datos);
                    alert('✅ Actualizado correctamente');
                } else {
                    const nuevoRef = push(ref(db, `${tipo}/${edificioActual}`));
                    await set(nuevoRef, datos);
                    alert('✅ Agregado correctamente');
                }
                
                cerrarModal();
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        };

        // Archivar
        window.archivarPersona = async function(key, tipo) {
            if (!confirm('📦 ¿Archivar este registro?\n\nSe mantendrá en el sistema pero marcado como archivado.')) {
                return;
            }
            
            try {
                const tipoPath = tipo === 'propietario' ? 'propietarios' : 'residentes';
                await update(ref(db, `${tipoPath}/${edificioActual}/${key}`), { estado: 'archivado' });
                alert('✅ Archivado correctamente');
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        };

        // Desarchivar
        window.desarchivarPersona = async function(key, tipo) {
            try {
                const tipoPath = tipo === 'propietario' ? 'propietarios' : 'residentes';
                await update(ref(db, `${tipoPath}/${edificioActual}/${key}`), { estado: 'activo' });
                alert('✅ Restaurado correctamente');
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        };

        // Eliminar
        window.eliminarPersona = async function(key, tipo) {
            if (!confirm('⚠️ ¿ELIMINAR PERMANENTEMENTE este registro?\n\nEsta acción NO se puede deshacer.\n\nSi solo quieres ocultarlo temporalmente, usa "Archivar" en su lugar.')) {
                return;
            }
            
            try {
                const tipoPath = tipo === 'propietario' ? 'propietarios' : 'residentes';
                await remove(ref(db, `${tipoPath}/${edificioActual}/${key}`));
                alert('✅ Eliminado permanentemente');
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        };

        // Poblar selector de vinculación con los apartamentos del edificio actual
        function poblarSelectVincular(keyPropio, valorActual) {
            const sel = document.getElementById('inputVinculadoApto');
            sel.innerHTML = '<option value="">— Sin vincular (tarjeta independiente) —</option>';
            const tipo = tabActual === 'propietarios' ? dataPropietarios : dataResidentes;
            const data = tipo[edificioActual] || {};
            Object.entries(data).forEach(([k, entry]) => {
                if (k === keyPropio) return; // no vincular a sí mismo
                if (entry.vinculadoAptoKey) return; // no mostrar los que ya son hijos
                const opt = document.createElement('option');
                opt.value = k;
                opt.textContent = `${entry.apto || k} — ${entry.nombre || ''}`;
                if (k === valorActual) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        // Auto-vincular garajes/parqueaderos por coincidencia de nombre de propietario
        window.autoVincular = function() {
            if (!edificioActual) { alert('⚠️ Primero selecciona un edificio'); return; }

            const tipo  = tabActual === 'propietarios' ? 'propietarios' : 'residentes';
            const data  = (tipo === 'propietarios' ? dataPropietarios : dataResidentes)[edificioActual];
            if (!data)  { alert('No hay registros en este edificio'); return; }

            const entries = Object.entries(data);

            // Padres = no son G/P/D y no están ya vinculados
            const padres = entries.filter(([, v]) =>
                !v.vinculadoAptoKey && !/^[GgPpDd]\d/i.test(v.apto || ''));

            // Hijos candidatos = empiezan con G, P o D seguido de dígito, sin vínculo aún
            const hijos = entries.filter(([, v]) =>
                !v.vinculadoAptoKey && /^[GgPpDd]\d/i.test(v.apto || ''));

            if (hijos.length === 0) {
                alert('No se encontraron garajes o parqueaderos sin vincular (entradas que empiecen con G, P o D seguido de número).');
                return;
            }

            // Emparejar por nombre exacto (case-insensitive, sin espacios extra)
            const norm = s => (s || '').toLowerCase().replace(/\s+/g, ' ').trim();
            const propuestas = [];
            const sinMatch   = [];

            hijos.forEach(([hijoKey, hijo]) => {
                const match = padres.find(([, p]) => norm(p.nombre) === norm(hijo.nombre) && norm(hijo.nombre));
                if (match) propuestas.push({ hijoKey, hijoApto: hijo.apto, padreKey: match[0], padreApto: match[1].apto, nombre: match[1].nombre });
                else        sinMatch.push(`${hijo.apto} (${hijo.nombre || 'sin nombre'})`);
            });

            if (propuestas.length === 0) {
                let msg = 'No se encontraron coincidencias por nombre.\n\nSin match:\n' + sinMatch.join('\n');
                msg += '\n\nVerifica que el nombre del propietario sea idéntico en el garaje y en el apartamento.';
                alert(msg);
                return;
            }

            let confirmMsg = `Se vincularán ${propuestas.length} garaje(s)/parqueadero(s):\n\n`;
            confirmMsg += propuestas.map(p => `✅  ${p.hijoApto}  →  ${p.padreApto} (${p.nombre})`).join('\n');
            if (sinMatch.length > 0) confirmMsg += `\n\n⚠️ Sin coincidencia (quedan sueltos):\n` + sinMatch.join('\n');
            confirmMsg += '\n\n¿Aplicar?';

            if (!confirm(confirmMsg)) return;

            Promise.all(
                propuestas.map(p => update(ref(db, `${tipo}/${edificioActual}/${p.hijoKey}`), { vinculadoAptoKey: p.padreKey }))
            ).then(() => alert(`✅ ${propuestas.length} vinculaciones aplicadas correctamente`))
             .catch(err => alert('❌ Error: ' + err.message));
        };

        // Calcular coeficiente total en tiempo real
        window.calcularCoefTotal = function() {
            const apto = parseFloat(document.getElementById('inputCoeficienteApto').value) || 0;
            const parq = parseFloat(document.getElementById('inputCoeficienteParq').value) || 0;
            const total = apto + parq;
            document.getElementById('displayCoefTotal').textContent = total > 0 ? (total * 100).toFixed(4) + '%' : '—';
        };

        // Exportar Excel
        window.exportarExcel = function() {
            alert('Función de exportar Excel - Por implementar');
        };
    </script>
</body>
</html>
